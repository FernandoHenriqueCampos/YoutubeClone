<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div class="headerLeftSide">
            <i class="bi bi-chevron-left" style="font-size: 24px;"></i>
            <h1>MrBeast</h1>
        </div>
        <div class="headerRightSide">
            <i class="bi bi-display"></i>
            <i class="bi bi-search"></i>
            <i class="bi bi-three-dots-vertical"></i>
        </div> 

    </header>
    <main>
        <section class="channelInfo">
            <div class="channelBanner">
                <img src="./Assets/banner.jpg" alt="Banner do Canal">
            </div>
            <section class="channelInfoBellow">
                <div class="channelImage">
                    <img src="./Assets/profile.jpg" alt="Imagem do Canal">
                </div>
                <h1>MrBeast</h1>
                <div class="channelDescription">
                    <span>SUBSCRIBE FOR A COOKIE! New MrBeast or MrBeast Gaming video every single Saturday at noon eastern time!</span>
                    <i class="bi bi-chevron-right"></i>
                </div>
                <button>Subscribe</button>
            </section>
        </section>

        <section class="videosContainer">
            <nav class="videosOptions">
                <ul>
                    <li class="active">HOME</li>
                    <li>VIDEOS</li>
                    <li>SHORTS</li>
                    <li>LIVE</li>
                    <li>PLAYLISTS</li>
                </ul>
            </nav>
            <div class="videosList">
                <div class="video">
                    <img src="./Assets/thumb.jpg" alt="Video">
                    <div class="videoInfo">
                        <div class="videoTitle">
                            <h1>$1 vs $10,000,000 Job!</h1>
                        </div>
                        <div class="videoStats">
                            <span>10M views</span>
                            <span>2 days ago</span>
                        </div>
                    </div>
                </div>
            </div>       
        </section>
    </main>
</body>
</html>
